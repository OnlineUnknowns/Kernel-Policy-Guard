# KernelPolicyGuard CI workflow for Linux kernel module builds
name: KernelPolicyGuard Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y linux-headers-$(uname -r) build-essential

      - name: Build kernel module
        run: |
          make -C /lib/modules/$(uname -r)/build M=$(pwd) modules

      - name: Upload KernelPolicyGuard artifact
        uses: actions/upload-artifact@v4
        with:
          # Artifact for the KernelPolicyGuard kernel module build
          name: kernel-policy-guard-module
          path: |
            *.ko
          if-no-files-found: error
